<svg xmlns="http://www.w3.org/2000/svg" width="82" height="49" viewBox="0 0 82 49" role="img" aria-label="Ping latency and packet loss display">
  <rect width="82" height="49" fill="#050505"/>
  <text x="6" y="18" fill="#00ff4a" font-family="Consolas, 'Courier New', monospace" font-size="14">PING:</text>
  <text x="48" y="18" fill="#00ff4a" font-family="Consolas, 'Courier New', monospace" font-size="14">52ms</text>
  <text x="6" y="38" fill="#00ff4a" font-family="Consolas, 'Courier New', monospace" font-size="14">LOSS:</text>
  <text x="55" y="38" fill="#00ff4a" font-family="Consolas, 'Courier New', monospace" font-size="14">0%</text>
</svg>
